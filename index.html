<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>多维</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#f7faf9] to-[#f3f0ff] min-h-screen flex justify-center">

<div class="w-full max-w-3xl px-6 py-10">

  <!-- 标题 -->
  <div class="mb-10">
    <h1 class="text-3xl font-semibold text-gray-800">多维</h1>
    <p class="text-gray-500 text-sm mt-2">帮你多想一步</p>
  </div>

  <!-- 输入框 -->
  <textarea id="input"
    class="w-full h-40 bg-white border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-green-300 transition"
    placeholder="粘贴一段内容..."></textarea>

  <!-- 示例 -->
  <button onclick="fillExample()" 
    class="mt-2 text-sm text-green-600 hover:underline">
    使用示例内容
  </button>

  <!-- 模式按钮 -->
  <div class="flex gap-2 mt-4">
    <button onclick="setMode('standard')" id="mode-standard"
      class="px-4 py-1.5 rounded-full text-sm transition bg-green-500 text-white shadow-sm">
      标准
    </button>

    <button onclick="setMode('question')" id="mode-question"
      class="px-4 py-1.5 rounded-full text-sm transition bg-gray-100 hover:bg-purple-100">
      提问
    </button>

    <button onclick="setMode('multi')" id="mode-multi"
      class="px-4 py-1.5 rounded-full text-sm transition bg-gray-100 hover:bg-purple-100">
      多视角
    </button>
  </div>

  <!-- 主按钮 -->
  <button onclick="analyze()"
    class="mt-5 w-full py-3 rounded-xl text-white font-medium
    bg-gradient-to-r from-green-400 to-purple-400
    hover:from-green-500 hover:to-purple-500
    transition shadow-md">
    开始分析
  </button>

  <!-- loading -->
  <div id="loading" class="hidden mt-4 text-gray-500">分析中...</div>

  <!-- 输出 -->
  <div id="output" class="mt-6"></div>

</div>

<script>
let currentMode = "standard";

function setMode(mode){
  currentMode = mode;

  ["standard","question","multi"].forEach(m=>{
    const el = document.getElementById("mode-"+m);

    if(m === mode){
      el.className = "px-4 py-1.5 rounded-full text-sm transition text-white shadow-sm " +
        (m==="standard"
          ? "bg-green-500"
          : m==="question"
          ? "bg-purple-400"
          : "bg-indigo-400");
    } else {
      el.className = "px-4 py-1.5 rounded-full text-sm transition bg-gray-100 hover:bg-purple-100";
    }
  });
}

function fillExample(){
  document.getElementById("input").value =
`某国宣布将大幅增加新能源投资，并表示这将改变全球能源格局。有观点认为，这一举措不仅是环保需求，更是地缘政治布局。`;
}

function getPrompt(text){

// ✅ 提问模式（优化）
if(currentMode==="question"){
return `
你是一个思考引导助手。

请基于内容提出3-5个有启发性的问题：
- 问题尽量具体
- 避免重复原文
- 可以从假设、逻辑、信息缺口等角度出发

直接输出问题，每个问题单独一行，例如：

1、问题一
2、问题二
3、问题三

内容：
${text}
`;
}

// ✅ 多视角模式（优化）
if(currentMode==="multi"){
return `
请从不同角度理解这段内容，并自然表达：

包括：
- 不同可能的理解视角（至少3种）
- 各视角之间的差异
- 可以进一步思考的问题

请用自然段表达，而不是机械格式。

内容：
${text}
`;
}

// ✅ 标准模式（彻底修复“prompt泄露”问题）
return `
你是一个思考引导助手。

请先理解文本，再进行结构化表达。

输出必须遵循以下结构，但不要重复这些说明：

1、这段内容在说什么  
使用以下两个小标题展开：
事实描述：  
观点/判断/推测：  

2、可能的前提  
分析该说法依赖的关键假设，以及可能被忽略的条件  

3、可以留意的表达或推理方式  
如存在逻辑跳跃，请用提问方式表达  

4、值得再想的问题  
提出2-4个新的思考问题  

5、进一步判断的建议  
说明还可以补充关注哪些信息或资料  

要求：
- 不做真假判断  
- 多使用“可能”“可以进一步思考”  
- 每部分适当展开  

内容：
${text}
`;
}

async function analyze(){

const text=document.getElementById("input").value;
const output=document.getElementById("output");
const loading=document.getElementById("loading");

if(!text.trim()) return alert("请输入内容");

loading.classList.remove("hidden");
output.innerHTML="";

const prompt=getPrompt(text);

try{
const res=await fetch("/api/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:prompt})
});

const data=await res.json();
const result=data.choices?.[0]?.message?.content;

if(!result) throw new Error("没有返回内容");

// ⭐ 渲染逻辑优化（兼容三种模式）

const container=document.createElement("div");
container.className = "bg-white border border-gray-100 rounded-xl p-6 leading-relaxed space-y-4 shadow-sm hover:shadow-md transition";

// 标准模式 → 分结构
if(currentMode==="standard"){

  const sections=result.split(/(?=\d、)/).filter(Boolean);

  sections.forEach(sec=>{
    const titleMatch=sec.match(/^(\d、[^\n]+)/);
    const title=titleMatch?titleMatch[0]:"";

    const content=sec.replace(title,"").trim();
    const lines=content.split("\n").filter(l=>l.trim());

    const titleEl=document.createElement("div");
    titleEl.className="font-semibold text-gray-900 mt-4";
    titleEl.innerText=title;
    container.appendChild(titleEl);

    lines.forEach(line=>{

      if(line.includes("：") && line.length < 20){
        const sub=document.createElement("div");
        sub.className="font-medium text-gray-700 mt-2";
        sub.innerText=line;
        container.appendChild(sub);
        return;
      }

      const row=document.createElement("div");
      row.className="flex items-start text-gray-700";

      row.innerHTML=`
        <div class="mr-2 mt-1 text-gray-400">•</div>
        <div>${line}</div>
      `;

      container.appendChild(row);
    });
  });

} else {

  // 👉 提问 & 多视角：直接像ChatGPT那样展示
  const paragraphs=result.split("\n").filter(p=>p.trim());

  paragraphs.forEach(p=>{
    const div=document.createElement("div");
    div.className="text-gray-800";
    div.innerText=p;
    container.appendChild(div);
  });

}

output.appendChild(container);

// ⭐ 独立提醒语
const note=document.createElement("div");
note.className="mt-6 text-sm text-gray-400 text-center font-semibold";
note.innerText="我也可能有遗漏和错误，你的判断更重要。";

output.appendChild(note);

}catch(err){
output.innerHTML="<div class='text-red-500'>出错了</div>";
}

loading.classList.add("hidden");
}
</script>

</body>
</html>
