<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>多维</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#fafafa] min-h-screen flex justify-center">

<div class="w-full max-w-3xl px-6 py-10">

  <!-- 顶部（Notion风） -->
  <div class="mb-10">
    <h1 class="text-3xl font-semibold">多维</h1>
    <p class="text-gray-400 text-sm mt-2">帮助你更好地理解信息，而不是替你下结论</p>
  </div>

  <!-- 输入 -->
  <div class="mb-6">
    <textarea id="input"
      class="w-full h-40 bg-white border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-1 focus:ring-gray-400"
      placeholder="粘贴一段内容..."></textarea>

    <!-- 示例 -->
    <button onclick="fillExample()" class="mt-2 text-sm text-gray-400 hover:underline">
      使用示例内容
    </button>

    <!-- 模式 -->
    <div class="flex gap-2 mt-4">
      <button onclick="setMode('standard')" id="mode-standard"
        class="px-3 py-1 text-sm rounded-full bg-black text-white">标准</button>
      <button onclick="setMode('question')" id="mode-question"
        class="px-3 py-1 text-sm rounded-full bg-gray-100">提问</button>
      <button onclick="setMode('multi')" id="mode-multi"
        class="px-3 py-1 text-sm rounded-full bg-gray-100">多视角</button>
    </div>

    <button onclick="analyze()"
      class="mt-4 w-full bg-black text-white py-3 rounded-xl">
      开始分析
    </button>
  </div>

  <!-- 引导 -->
  <div id="guide" class="text-gray-400 text-sm mb-6">
    选择模式 → 粘贴内容 → 开始分析  
  </div>

  <!-- loading -->
  <div id="loading" class="hidden text-gray-400 mb-6">
    分析中...
  </div>

  <!-- 输出 -->
  <div id="output" class="space-y-6"></div>

  <!-- 复制 -->
  <button id="copyBtn" onclick="copyResult()"
    class="hidden mt-6 w-full border border-gray-200 py-2 rounded-xl text-sm text-gray-600">
    复制全部内容
  </button>

</div>

<script>
let currentMode = "standard";

function setMode(mode) {
  currentMode = mode;
  ["standard", "question", "multi"].forEach(m => {
    document.getElementById("mode-" + m).className =
      "px-3 py-1 text-sm rounded-full " +
      (m === mode ? "bg-black text-white" : "bg-gray-100");
  });
}

function fillExample() {
  document.getElementById("input").value =
`某国宣布将大幅增加新能源投资，并表示这将改变全球能源格局。有观点认为，这一举措不仅是环保需求，更是地缘政治布局。`;
}

function getPrompt(text) {
  if (currentMode === "question") {
    return `
请提出3-5个问题，引导用户思考，每行一个问题：

1、问题一
2、问题二
3、问题三

内容：
${text}
`;
  }

  if (currentMode === "multi") {
    return `
请提供不同理解角度：

1、视角一
2、视角二
3、视角三

并提出进一步思考问题

内容：
${text}
`;
  }

  return `
请按结构输出，每一行一个要点：

1、这段内容在说什么
2、可能的前提
3、可以留意的表达方式
4、值得再想的问题
5、进一步判断的建议

不要使用符号，用自然语言分行表达

内容：
${text}
`;
}

async function analyze() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");

  if (!text.trim()) return alert("请输入内容");

  document.getElementById("guide").style.display = "none";
  loading.classList.remove("hidden");
  output.innerHTML = "";

  const prompt = getPrompt(text);

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ text: prompt })
    });

    const data = await res.json();
    const result = data.choices?.[0]?.message?.content;

    if (!result) throw new Error("没有返回内容");

    const finalText = result + "\n\n我也可能有遗漏和错误，你的判断更重要。";

    const sections = finalText.split(/(?=\d、)/).filter(Boolean);

    sections.forEach(sec => {

      const titleMatch = sec.match(/^(\d、[^\n]+)/);
      const title = titleMatch ? titleMatch[0] : "";

      const content = sec.replace(title, "").trim();
      const lines = content.split("\n").filter(l => l.trim());

      const div = document.createElement("div");
      div.className = "bg-white border border-gray-200 rounded-xl p-5";

      const titleEl = document.createElement("div");
      titleEl.className = "font-semibold text-gray-800 mb-3";
      titleEl.innerText = title;

      div.appendChild(titleEl);

      lines.forEach(line => {
        const row = document.createElement("div");
        row.className = "flex items-start text-gray-700 mb-2";

        row.innerHTML = `
          <div class="mr-2 mt-1 text-gray-400">•</div>
          <div>${line}</div>
        `;

        div.appendChild(row);
      });

      output.appendChild(div);
    });

    document.getElementById("copyBtn").classList.remove("hidden");

  } catch (err) {
    output.innerHTML = `<div class="text-red-500">${err.message}</div>`;
  }

  loading.classList.add("hidden");
}

function copyResult() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("已复制");
}
</script>

</body>
</html>
