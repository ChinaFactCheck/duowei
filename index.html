<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>多维</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#fafafa] min-h-screen flex justify-center">

<div class="w-full max-w-3xl px-6 py-10">

  <div class="mb-10">
    <h1 class="text-3xl font-semibold">多维</h1>
    <p class="text-gray-400 text-sm mt-2">不是给答案，而是帮你多想一步</p>
  </div>

  <textarea id="input"
    class="w-full h-40 bg-white border border-gray-200 rounded-xl p-4"
    placeholder="粘贴一段内容..."></textarea>

  <div class="flex gap-2 mt-4">
    <button onclick="setMode('standard')" id="mode-standard"
      class="px-3 py-1 rounded-full bg-black text-white text-sm">标准</button>
    <button onclick="setMode('question')" id="mode-question"
      class="px-3 py-1 rounded-full bg-gray-100 text-sm">提问</button>
    <button onclick="setMode('multi')" id="mode-multi"
      class="px-3 py-1 rounded-full bg-gray-100 text-sm">多视角</button>
  </div>

  <button onclick="analyze()"
    class="mt-4 w-full bg-black text-white py-3 rounded-xl">
    开始分析
  </button>

  <div id="loading" class="hidden mt-4 text-gray-400">分析中...</div>

  <div id="output" class="space-y-6 mt-6"></div>

</div>

<script>
let currentMode = "standard";

function setMode(mode) {
  currentMode = mode;
  ["standard","question","multi"].forEach(m=>{
    document.getElementById("mode-"+m).className =
      "px-3 py-1 rounded-full text-sm " +
      (m===mode ? "bg-black text-white":"bg-gray-100");
  });
}

function getPrompt(text){

// ⭐⭐⭐ 核心：两阶段思考 ⭐⭐⭐

if(currentMode==="question"){
return `
你是一个思考引导助手。

第一步：请先在内部充分思考（不要输出），找出文本中：
- 关键假设
- 可能的逻辑跳跃
- 可以延展的不同理解路径

第二步：基于上述思考，输出3-5个高质量问题：

要求：
- 问题具体、有启发性
- 避免泛泛而谈
- 可以附带一句简短说明

格式：

1、问题一
（说明）

2、问题二

内容：
${text}
`;
}

if(currentMode==="multi"){
return `
你是一个帮助用户理解复杂问题的助手。

第一步：先分析文本可能涉及的不同立场、利益或解释路径（不输出）

第二步：整理为：

1、可能的不同视角
（至少3种，每种稍微展开）

2、这些视角的差异点

3、可以进一步思考的问题

要求：
- 不下结论
- 保持中性

内容：
${text}
`;
}

// ⭐⭐⭐ 标准模式（高质量版）⭐⭐⭐
return `
你是一个“思考引导助手”。

第一步（内部思考，不输出）：
请深入分析文本，包括：
- 核心论点结构
- 隐含前提
- 可能的逻辑跳跃
- 信息缺口

第二步（对用户输出）：

请按结构整理输出，每一部分可以有2-4行：

1、这段内容在说什么  
区分事实描述与观点判断，并简要解释表达方式  

2、可能的前提  
分析其依赖的关键假设（包括隐含前提）  
以及可能被忽略的条件  

3、可以留意的表达或推理方式  
如果存在逻辑简化或跳跃，用“提问方式”指出  

4、值得再想的问题  
提出2-4个有启发的问题  

5、进一步判断的建议  
如果想更全面理解，还可以关注哪些信息或资料  

要求：
- 不做真假判断  
- 多用“可能”“可以进一步思考”  
- 避免一句话式回答  

内容：
${text}
`;
}

async function analyze(){

const text=document.getElementById("input").value;
const output=document.getElementById("output");
const loading=document.getElementById("loading");

if(!text.trim()) return alert("请输入内容");

loading.classList.remove("hidden");
output.innerHTML="";

const prompt=getPrompt(text);

try{
const res=await fetch("/api/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:prompt})
});

const data=await res.json();
const result=data.choices?.[0]?.message?.content;

if(!result) throw new Error("无返回");

const finalText=result+"\n\n我也可能有遗漏和错误，你的判断更重要。";

// 自动结构解析
const sections=finalText.split(/(?=\d、)/).filter(Boolean);

sections.forEach(sec=>{
const titleMatch=sec.match(/^(\d、[^\n]+)/);
const title=titleMatch?titleMatch[0]:"";
const content=sec.replace(title,"").trim();
const lines=content.split("\n").filter(l=>l.trim());

const card=document.createElement("div");
card.className="bg-white border border-gray-200 rounded-xl p-5";

const titleEl=document.createElement("div");
titleEl.className="font-semibold mb-3";
titleEl.innerText=title;

card.appendChild(titleEl);

lines.forEach(line=>{
const row=document.createElement("div");
row.className="flex items-start text-gray-700 mb-2";

row.innerHTML=`
<div class="mr-2 mt-1 text-gray-400">•</div>
<div>${line}</div>
`;

card.appendChild(row);
});

output.appendChild(card);
});

}catch(err){
output.innerHTML="<div class='text-red-500'>出错了</div>";
}

loading.classList.add("hidden");
}
</script>

</body>
</html>
