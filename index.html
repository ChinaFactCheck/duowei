<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>三思AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-[#f7faf9] to-[#f3f0ff] min-h-screen flex justify-center">

<div class="w-full max-w-3xl px-6 py-10">

  <!-- 标题 -->
  <div class="mb-10">
    <h1 class="text-3xl font-semibold text-gray-800">三思AI</h1>
    <p class="text-gray-500 text-sm mt-2">帮你多想一步</p>
  </div>

  <!-- 输入 -->
  <textarea id="input"
    class="w-full h-40 bg-white border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-green-300"
    placeholder="粘贴新闻 / 视频内容 / 评论区 / 或你的理解..."></textarea>

  <!-- 示例 -->
  <button onclick="fillExample()" class="mt-2 text-sm text-green-600 hover:underline">
    使用示例内容
  </button>

  <div class="text-sm text-gray-400 mt-1">
    支持：新闻、短视频字幕、评论区、截图整理内容
  </div>

  <!-- 模式选择 -->
  <div class="flex gap-2 mt-4 flex-wrap">
    <button onclick="setMode('standard')" id="mode-standard"
      class="px-4 py-1.5 rounded-full text-sm bg-green-500 text-white">标准</button>

    <button onclick="setMode('question')" id="mode-question"
      class="px-4 py-1.5 rounded-full text-sm bg-gray-100">提问</button>

    <button onclick="setMode('multi')" id="mode-multi"
      class="px-4 py-1.5 rounded-full text-sm bg-gray-100">多视角</button>

    <button onclick="setMode('video')" id="mode-video"
      class="px-4 py-1.5 rounded-full text-sm bg-gray-100">短视频</button>
  </div>

  <!-- 按钮 -->
  <button onclick="analyze()"
    class="mt-5 w-full py-3 rounded-xl text-white font-medium
    bg-gradient-to-r from-green-400 to-purple-400
    hover:from-green-500 hover:to-purple-500 transition shadow-md">
    开始分析
  </button>

  <!-- loading -->
  <div id="loading" class="hidden mt-4 text-gray-500">分析中...</div>

  <!-- 输出 -->
  <div id="output" class="mt-6"></div>

</div>

<script>
let currentMode = "standard";

function setMode(mode){
  currentMode = mode;

  ["standard","question","multi","video"].forEach(m=>{
    const el = document.getElementById("mode-"+m);

    if(m === mode){
      el.className = "px-4 py-1.5 rounded-full text-sm text-white " +
        (m==="standard"
          ? "bg-green-500"
          : m==="question"
          ? "bg-purple-400"
          : m==="multi"
          ? "bg-indigo-400"
          : "bg-pink-400");
    } else {
      el.className = "px-4 py-1.5 rounded-full text-sm bg-gray-100";
    }
  });
}

function fillExample(){
  document.getElementById("input").value =
`某视频称：某国经济即将崩溃，引发大量网友讨论，有人表示担忧，也有人认为是夸张说法。`;
}

function getPrompt(text){

if(currentMode==="question"){
return `
请提出3-5个有启发性的问题，每行一个：

内容：
${text}
`;
}

if(currentMode==="multi"){
return `
请从不同角度理解这段内容，并自然表达不同视角及差异：

内容：
${text}
`;
}

// ⭐短视频模式
if(currentMode==="video"){
return `
你是一个短视频信息理解助手。

请分析：

1、这段内容在表达什么  
区分：
事实性信息：
观点/情绪：

2、信息可能缺失的部分  

3、表达方式中可以留意的点（用提问方式表达）

4、不同可能的理解角度  

5、可以进一步思考的问题  

要求：
- 信息可能不完整
- 不做真假判断
- 使用“可能”等表达

内容：
${text}
`;
}

// ⭐标准模式
return `
你是一个思考引导助手。

请对内容进行结构化分析，并用自然表达呈现。

输出需包含以下部分：

1、这段内容在说什么  
使用两个小标题展开：  
事实描述：提取可以被验证的信息，避免重复原文  
观点/判断/推测：识别带解释、立场或推断的内容  

2、可能的前提  
分析该说法成立所依赖的关键假设，包括隐含前提  
可以考虑这些前提是否被充分说明  

3、可以留意的表达或推理方式  
如果存在逻辑跳跃或简化表达，请用提问方式呈现  
例如是否存在因果简化、以偏概全等  

4、值得再想的问题  
提出2-4个有延伸性的思考问题  

5、进一步判断的建议  
说明可以关注哪些信息或资料来更全面理解  

要求：
- 不做真假判断  
- 避免简单重复原文  
- 多使用“可能”“可以进一步思考”等表达  
- 每一部分适度展开，而不是一句话带过  

内容：
${text}
`;
}

async function analyze(){

const text=document.getElementById("input").value;
const output=document.getElementById("output");
const loading=document.getElementById("loading");

if(!text.trim()) return alert("请输入内容");

loading.classList.remove("hidden");
output.innerHTML="";

const prompt=getPrompt(text);

try{
const res=await fetch("/api/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:prompt})
});

const data=await res.json();
const result=data.choices?.[0]?.message?.content;

if(!result) throw new Error("no result");

// 创建容器
const container=document.createElement("div");
container.className="bg-white border border-gray-100 rounded-xl p-6 space-y-4 shadow-sm";

// ⭐短视频提示
if(currentMode==="video"){
  const tip=document.createElement("div");
  tip.className="text-sm text-purple-500";
  tip.innerText="提示：短视频内容可能是片段表达，可以留意未呈现的信息";
  container.appendChild(tip);
}

// ⭐标准模式结构化
if(currentMode==="standard"){

  const sections=result.split(/(?=\d、)/).filter(Boolean);

  sections.forEach(sec=>{
    const titleMatch=sec.match(/^(\d、[^\n]+)/);
    const title=titleMatch?titleMatch[0]:"";

    const content=sec.replace(title,"").trim();
    const lines=content.split("\n").filter(l=>l.trim());

    const titleEl=document.createElement("div");
    titleEl.className="font-semibold text-gray-900";
    titleEl.innerText=title;
    container.appendChild(titleEl);

    lines.forEach(line=>{
      const row=document.createElement("div");
      row.className="flex items-start text-gray-700";

      row.innerHTML=`
        <div class="mr-2 mt-1 text-gray-400">•</div>
        <div>${line}</div>
      `;

      container.appendChild(row);
    });
  });

} else {

// 👉 其他模式（更自然）
const paragraphs=result.split("\n").filter(p=>p.trim());

paragraphs.forEach(p=>{
  const div=document.createElement("div");
  div.className="text-gray-800";
  div.innerText=p;
  container.appendChild(div);
});

}

output.appendChild(container);

// ⭐提醒语
const note=document.createElement("div");
note.className="mt-6 text-sm text-gray-400 text-center font-semibold";
note.innerText="我也可能有遗漏和错误，你的判断更重要。";

output.appendChild(note);

}catch(err){
output.innerHTML="<div class='text-red-500'>出错了</div>";
}

loading.classList.add("hidden");
}
</script>

</body>
</html>
