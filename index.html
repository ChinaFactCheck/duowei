<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>多维</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen p-6 flex justify-center">

<div class="max-w-3xl w-full">

  <!-- 标题 -->
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold">多维</h1>
    <p class="text-gray-500 mt-2">帮你多想一步</p>
  </div>

  <!-- 输入区 -->
  <div class="bg-white p-5 rounded-2xl shadow mb-4">
    <textarea id="input" class="w-full h-40 border rounded-lg p-3"
      placeholder="粘贴新闻内容..."></textarea>

    <button onclick="analyze()"
      class="mt-4 w-full bg-black text-white py-3 rounded-xl">
      开始分析
    </button>
  </div>

  <!-- loading -->
  <div id="loading" class="hidden text-center text-gray-400 my-4">
    分析中...
  </div>

  <!-- 结果区 -->
  <div id="output" class="space-y-4"></div>

</div>

<script>
async function analyze() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");

  if (!text.trim()) return alert("请输入内容");

  loading.classList.remove("hidden");
  output.innerHTML = "";

  const prompt = `你是一个“信息理解辅助工具”和“论证分析与思考引导助手”，不是事实裁判，不是事实核查员。

你的任务不是判断真假或对错，而是帮助用户：
1. 更清晰理解结构
2. 发现可能忽略的信息
3. 识别可能的逻辑问题
4. 接触不同视角

请严格遵守以下原则：
1. 不做真假判断
2. 不使用绝对性语言（如“正确”“错误”“真实”“虚假”“谣言”“辟谣”）
3. 所有分析基于文本本身
4. 多使用“可能”“可以进一步思考”等表达
5. 语气保持温和、中性、像朋友提醒

输出要求：

1. 使用“1、2、3、4”分点表达 
2. 可以使用专业术语或复杂概念，但同时请用通俗语言解释下 
	
输出结构（必须严格遵守）

1. 这段内容在说什么
•哪些是事实描述 
•哪些是观点 / 判断 / 推测 

2. 该说法可能的前提
•这个说法默认了什么 
•请识别文章中的关键假设（包括隐含假设）	
•这个说法可能容易让人忽略什么？

3. 可以留意的表达或推理方式
请识别文章中可能出现的常见逻辑问题。如果有逻辑问题，请以提问形式呈现（例如：“作者是否将相关性等同于因果性？”），而不是直接断言“这是错的”。
但如果没有逻辑问题，不要强行生成问题，以避免过度解读。 

4. 值得再想的问题
提出2–5个“你可能忽略的关键问题”，引导用户思考，不直接给出答案，只做引导，激发用户独立思考。

比如：
•这篇内容有没有信息缺口？
•有没有可能的另一种解释？
•如果某些前提不成立，这个说法还站得住吗？ 

5. 进一步判断的建议
给出如何进一步了解或验证的具体方法 ，如：

•需要哪些补充数据或信息？
•可以查找哪些资料？
 
结尾必须包含：
我也可能有遗漏和错误，你的判断更重要。

${text}`;

  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
  text: prompt
})
  });

  const data = await res.json();
  console.log(data);
  const result = data.choices?.[0]?.message?.content;

if (!result) {
  output.innerHTML = "没有返回结果，可能请求失败";
  loading.classList.add("hidden");
  return;
}

  // 分块处理
  const sections = result.split(/(?=\d、)/);

  sections.forEach(sec => {
    const div = document.createElement("div");
    div.className = "bg-white p-4 rounded-2xl shadow whitespace-pre-wrap";
    div.innerText = sec;
    output.appendChild(div);
  });

  loading.classList.add("hidden");
}
</script>

</body>
</html>
