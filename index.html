<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>多维</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen p-6 flex justify-center">

<div class="max-w-3xl w-full">

  <!-- 顶部 -->
  <div class="flex justify-between items-center mb-6">
    <div>
      <h1 class="text-2xl font-bold">多维</h1>
      <p class="text-gray-500 text-sm">帮你多想一步</p>
    </div>
    <div class="text-xs text-gray-400">v1</div>
  </div>

  <!-- 输入区 -->
  <div class="bg-white p-5 rounded-2xl shadow-md border border-gray-100 mb-4">
    <textarea id="input"
      class="w-full h-40 border border-gray-200 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-black"
      placeholder="粘贴一段内容，试着多想一步..."></textarea>

    <!-- 模式选择 -->
    <div class="flex gap-2 mt-4">
      <button onclick="setMode('standard')" id="mode-standard"
        class="px-3 py-1 rounded-lg bg-black text-white text-sm">标准分析</button>
      <button onclick="setMode('question')" id="mode-question"
        class="px-3 py-1 rounded-lg bg-gray-100 text-sm">提问模式</button>
      <button onclick="setMode('multi')" id="mode-multi"
        class="px-3 py-1 rounded-lg bg-gray-100 text-sm">多视角</button>
    </div>

    <button onclick="analyze()"
      class="mt-4 w-full bg-black text-white py-3 rounded-xl hover:opacity-90 transition">
      开始分析
    </button>
  </div>

  <!-- loading -->
  <div id="loading" class="hidden text-center text-gray-400 my-4">
    分析中...
  </div>

  <!-- 空状态 -->
  <div id="empty" class="text-center text-gray-400 mt-10">
    输入一段内容，看看会发生什么
  </div>

  <!-- 输出 -->
  <div id="output" class="space-y-4 mt-4"></div>

</div>

<script>
let currentMode = "standard";

function setMode(mode) {
  currentMode = mode;

  ["standard", "question", "multi"].forEach(m => {
    document.getElementById("mode-" + m).className =
      "px-3 py-1 rounded-lg text-sm " +
      (m === mode ? "bg-black text-white" : "bg-gray-100");
  });
}

function getPrompt(text) {
  if (currentMode === "question") {
    return `
你是一个帮助用户深入思考的助手。

请不要总结内容，而是提出问题：

- 提出3-5个关键问题
- 帮助用户发现盲点
- 鼓励从不同角度思考

使用清晰格式：
## 问题
- ...

内容：
${text}
`;
  }

  if (currentMode === "multi") {
    return `
你是一个帮助用户理解不同视角的助手。

请从不同角度分析：

## 可能的不同视角
- 视角1：
- 视角2：
- 视角3：

## 各自关注点
- ...

## 可以进一步思考的问题
- ...

内容：
${text}
`;
  }

  return `
你是一个“思考引导助手”，帮助用户多想一步。

请按结构输出：

## 1、这段内容在说什么
- 区分事实与观点

## 2、可能的前提
- 有哪些隐含假设
- 有什么容易忽略

## 3、可以留意的表达方式
- 如果存在推理跳跃，请用提问指出

## 4、值得再想的问题
- 提出2-4个问题

要求：
- 不做真假判断
- 多用“可能”“可以进一步思考”

内容：
${text}
`;
}

async function analyze() {
  const text = document.getElementById("input").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");
  const empty = document.getElementById("empty");

  if (!text.trim()) return alert("请输入内容");

  empty.style.display = "none";
  loading.classList.remove("hidden");
  output.innerHTML = "";

  const prompt = getPrompt(text);

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        text: prompt
      })
    });

    const data = await res.json();
    console.log(data);

    const result = data.choices?.[0]?.message?.content;

    if (!result) {
      throw new Error("没有返回内容");
    }

    const sections = result.split(/(?=## )/);

    sections.forEach(sec => {
      const div = document.createElement("div");
      div.className = "bg-white p-6 rounded-2xl shadow-md border border-gray-100 leading-relaxed";

      div.innerHTML = sec
        .replace(/## (.*)/g, '<h2 class="text-lg font-bold mb-2">$1</h2>')
        .replace(/- (.*)/g, '<li class="ml-5 list-disc">$1</li>');

      output.appendChild(div);
    });

  } catch (err) {
    output.innerHTML = `<div class="text-red-500">出错了：${err.message}</div>`;
  }

  loading.classList.add("hidden");
}
</script>

</body>
</html>
